<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Premier Budget JS</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; text-align: center; background: #1e1e2e; color: #cdd6f4; }
.container { background: #313244; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
li { padding: 10px; border-bottom: 1px solid #45475a; display: flex; justify-content: space-between; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .solde { font-size: 32px; font-weight: bold; margin: 20px 0; color: #2ecc71; }
        .inputs { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input, select, button { padding: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #ddd; }
        button { background-color: #3498db; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        ul { list-style: none; padding: 0; text-align: left; }
        li { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .plus { color: #2ecc71; font-weight: bold; }
        .moins { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="titreBienvenue">💰 Mon Budget</h1>
        <div class="solde">Solde : <span id="soldeTotal">0</span> €</div>

        <div class="inputs">
            <input type="text" id="nomTransaction" placeholder="Ex: Salaire, Courses...">
            <input type="number" id="montant" placeholder="Montant (ex: 50)">
            <select id="type">
                <option value="revenu">📈 Revenu (+)</option>
                <option value="depense">📉 Dépense (-)</option>
            </select>
            <button id="btnAjouter">Ajouter</button>
        </div>

        <h3>Historique :</h3>
        <ul id="listeTransactions"></ul>
        <button id="btnReset" style="background-color: #e74c3c; color: white; border: none; border-radius: 5px; padding: 10px; margin-top: 20px; width: 100%; font-weight: bold; cursor: pointer;">Réinitialiser le compte</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
